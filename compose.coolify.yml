services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      POCKETBASE_HOST: pocketbase:8090
    depends_on:
      pocketbase:
        condition: service_healthy
    expose:
      - '8080'
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.starsummit-karaoke-frontend.entrypoints=https'
      - 'traefik.http.routers.starsummit-karaoke-frontend.rule=Host(`karaoke-test.app.starsummit.net`)'
      - 'traefik.http.routers.starsummit-karaoke-frontend.tls=true'
      - 'traefik.http.routers.starsummit-karaoke-frontend.tls.certresolver=letsencrypt'
      - 'traefik.http.services.starsummit-karaoke-frontend.loadbalancer.server.port=8080'
    networks:
      - coolify
  pocketbase:
    build:
      context: pocketbase
      dockerfile: Dockerfile
    environment:
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:?Set the server-only primary YouTube API key}
      YOUTUBE_API_KEY_BACKUP: ${YOUTUBE_API_KEY_BACKUP:-}
    volumes:
      - pocketbase_data:/pb/pb_data
    expose:
      - '8090'
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.starsummit-karaoke-pocketbase.entrypoints=https'
      - 'traefik.http.routers.starsummit-karaoke-pocketbase.rule=Host(`controller-test.app.starsummit.net`)'
      - 'traefik.http.routers.starsummit-karaoke-pocketbase.tls=true'
      - 'traefik.http.routers.starsummit-karaoke-pocketbase.tls.certresolver=letsencrypt'
      - 'traefik.http.services.starsummit-karaoke-pocketbase.loadbalancer.server.port=8090'
    networks:
      - coolify
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:8090/api/health']
      interval: 30s
      timeout: 3s
      retries: 3
volumes:
  pocketbase_data:
    name: ${POCKETBASE_VOLUME_NAME:?Set POCKETBASE_VOLUME_NAME to the approved existing Coolify volume}
    external: true
networks:
  coolify:
    external: true
